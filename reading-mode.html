<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modalità Lettura - AI Article Summarizer</title>
  <link rel="stylesheet" href="reading-mode.css">
</head>
<body>
  <!-- Header -->
  <header class="reading-header">
    <div class="header-left">
      <button id="backBtn" class="icon-btn" title="Torna al popup">
        ← Indietro
      </button>
      <h1>📖 Modalità Lettura</h1>
    </div>
    <div class="header-right">
      <div class="font-size-controls">
        <button id="fontDecreaseBtn" class="icon-btn" title="Riduci dimensione testo">
          A-
        </button>
        <span id="fontSizeLabel" class="font-size-label">M</span>
        <button id="fontIncreaseBtn" class="icon-btn" title="Aumenta dimensione testo">
          A+
        </button>
      </div>
      <button id="themeToggleBtn" class="icon-btn" title="Cambia tema">
        🌙
      </button>
      <button id="copyBtn" class="icon-btn" title="Copia tutto">
        📋
      </button>
      <button id="exportBtn" class="icon-btn" title="Esporta PDF">
        📄 PDF
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="reading-container">
    <!-- Left Panel: Original Article -->
    <div class="panel article-panel">
      <div class="panel-header">
        <h2>📄 Articolo Originale</h2>
        <div class="article-meta">
          <span id="articleWordCount">0 parole</span>
          <span>•</span>
          <span id="articleReadTime">0 min</span>
        </div>
        <div class="view-toggle">
          <button id="viewIframeBtn" class="view-btn active" title="Vista pagina originale">🌐 Originale</button>
          <button id="viewTextBtn" class="view-btn" title="Vista testo pulito">📄 Testo</button>
        </div>
      </div>
      <div class="panel-content" id="articleContent">
        <!-- Iframe view (default) -->
        <iframe id="articleIframe" class="article-iframe" sandbox="allow-same-origin allow-scripts" allow="encrypted-media"></iframe>
        
        <!-- Text view (hidden by default) -->
        <div id="articleText" class="article-text hidden">
          <div class="loading-state">
            <div class="spinner"></div>
            <p>Caricamento articolo...</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Divider -->
    <div class="divider" id="divider"></div>

    <!-- Right Panel: Summary -->
    <div class="panel summary-panel">
      <div class="panel-header">
        <h2>✨ Analisi Articolo</h2>
        <div class="summary-meta">
          <span id="summaryProvider">-</span>
          <span>•</span>
          <span id="summaryLanguage">-</span>
        </div>
        <!-- Voice Controls -->
        <div class="voice-controls">
          <button id="ttsPlayBtn" class="voice-btn" title="Leggi ad alta voce">
            🔊
          </button>
          <button id="ttsPauseBtn" class="voice-btn" title="Pausa" style="display: none;">
            ⏸️
          </button>
          <button id="ttsStopBtn" class="voice-btn" title="Stop" style="display: none;">
            ⏹️
          </button>
        </div>
      </div>
      
      <!-- Tabs for different views -->
      <div class="summary-tabs">
        <button class="summary-tab active" data-tab="summary">📝 Riassunto</button>
        <button class="summary-tab" data-tab="keypoints">🔑 Punti Chiave</button>
        <button class="summary-tab" data-tab="translation">🌍 Traduzione</button>
        <button class="summary-tab" data-tab="citations">📚 Citazioni</button>
        <button class="summary-tab" data-tab="qa">💬 Q&A</button>
      </div>
      
      <div class="panel-content" id="summaryContent">
        <!-- Summary Tab -->
        <div id="summaryTabContent" class="summary-tab-content active">
          <div class="loading-state">
            <div class="spinner"></div>
            <p>Caricamento riassunto...</p>
          </div>
        </div>
        
        <!-- Key Points Tab -->
        <div id="keypointsTabContent" class="summary-tab-content">
          <div class="loading-state">
            <div class="spinner"></div>
            <p>Caricamento punti chiave...</p>
          </div>
        </div>
        
        <!-- Translation Tab -->
        <div id="translationTabContent" class="summary-tab-content">
          <div class="empty-state">
            <p>Nessuna traduzione disponibile</p>
            <button id="translateBtn" class="btn btn-primary">🌍 Traduci Articolo</button>
          </div>
        </div>
        
        <!-- Citations Tab -->
        <div id="citationsTabContent" class="summary-tab-content">
          <div class="empty-state">
            <p>Nessuna citazione disponibile</p>
            <button id="extractCitationsBtn" class="btn btn-primary">📖 Estrai Citazioni</button>
          </div>
        </div>
        
        <!-- Q&A Tab -->
        <div id="qaTabContent" class="summary-tab-content">
          <div class="qa-section">
            <div class="qa-input-group">
              <input type="text" id="qaInput" placeholder="Fai una domanda sull'articolo..." />
              <button id="qaVoiceBtn" class="btn btn-voice" title="Domanda vocale">🎤</button>
              <button id="qaAskBtn" class="btn btn-primary">Chiedi</button>
            </div>
            <div id="qaHistory" class="qa-history"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="lib/jspdf.umd.min.js"></script>
  <script src="utils/storage-manager.js"></script>
  <script src="utils/i18n.js"></script>
  <script src="utils/input-sanitizer.js"></script>
  <script src="utils/api-client.js"></script>
  <script src="utils/advanced-analysis.js"></script>
  <script src="utils/translator.js"></script>
  <script src="utils/citation-extractor.js"></script>
  <script src="utils/pdf-exporter.js"></script>
  <script src="utils/tts-manager.js"></script>
  <script src="utils/stt-manager.js"></script>
  <script src="utils/voice-controller.js"></script>
  <script src="reading-mode.js"></script>
</body>
</html>
