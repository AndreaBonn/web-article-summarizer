<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Article Summarizer - Debug</title>
  <style>
    body {
      width: 400px;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
    button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      cursor: pointer;
    }
    #output {
      margin-top: 20px;
      padding: 10px;
      background: #f0f0f0;
      border-radius: 5px;
      max-height: 300px;
      overflow-y: auto;
    }
    .error {
      color: red;
    }
    .success {
      color: green;
    }
  </style>
</head>
<body>
  <h2>Web Sites Summarizer (Debug)</h2>
  
  <button id="testBtn">Test Estrazione</button>
  <button id="settingsBtn">Apri Impostazioni</button>
  
  <div id="output">
    <p>Clicca "Test Estrazione" per provare...</p>
  </div>

  <script src="popup-simple.js"></script>
</body>
</html>
