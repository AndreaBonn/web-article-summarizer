name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: Security Audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Test
        run: npx vitest run --reporter=default --reporter=junit --outputFile=test-results.xml

      - name: Build
        run: npm run build

      - name: Generate test badge
        if: always()
        run: |
          python3 -c "
          import json, xml.etree.ElementTree as ET, os
          if not os.path.exists('test-results.xml'):
              badge = {'schemaVersion': 1, 'label': 'tests', 'message': 'no results', 'color': 'lightgrey'}
          else:
              root = ET.parse('test-results.xml').getroot()
              suites = root.findall('testsuite') if root.tag == 'testsuites' else [root]
              tests = sum(int(s.attrib.get('tests', 0)) for s in suites)
              failures = sum(int(s.attrib.get('failures', 0)) for s in suites)
              errors = sum(int(s.attrib.get('errors', 0)) for s in suites)
              passed = tests - failures - errors
              badge = {
                  'schemaVersion': 1,
                  'label': 'tests',
                  'message': f'{passed}/{tests} passed' if failures + errors > 0 else f'{passed} passed',
                  'color': 'red' if failures + errors > 0 else 'brightgreen'
              }
          os.makedirs('badges', exist_ok=True)
          with open('badges/test-badge.json', 'w') as f:
              json.dump(badge, f)
          "

      - name: Commit badge
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/test-badge.json
          git diff --cached --quiet || git commit -m "ci: update test badge [skip ci]"
          git push
